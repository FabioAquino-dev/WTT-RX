<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>WTT-RX</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">

    <header class="app__header">
      <svg class="app__logo" width="18" height="18" viewBox="0 0 24 24" fill="none"
           aria-hidden="true" focusable="false">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#1e9af5" stroke-width="2"
              stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1e9af5" stroke-width="2"
              stroke-linejoin="round"/>
      </svg>
      <h1 class="app__title">WTT-RX</h1>
      <span class="app__version" id="js-version">v0.1.0</span>
    </header>

    <main class="app__content">

      <section class="status-card" aria-label="Status atual">
        <span class="status-card__dot" id="js-status-dot" aria-hidden="true"></span>
        <span class="status-card__label" id="js-status-label">Verificando...</span>
      </section>

      <section class="actions" aria-label="Controles de automação">
        <button class="btn btn--primary" id="js-btn-start"
                aria-label="Iniciar automação de exames">
          Iniciar
        </button>
        <button class="btn btn--danger" id="js-btn-stop"
                aria-label="Parar automação" disabled>
          Parar
        </button>
      </section>

      <section class="stats" aria-label="Estatísticas da sessão">
        <div class="stats__item">
          <span class="stats__value" id="js-queue-size">0</span>
          <span class="stats__label">na fila</span>
        </div>
        <div class="stats__item">
          <span class="stats__value" id="js-processed">0</span>
          <span class="stats__label">processados</span>
        </div>
        <div class="stats__item">
          <span class="stats__value" id="js-errors">0</span>
          <span class="stats__label">erros</span>
        </div>
      </section>

      <section class="log" aria-label="Log de atividade" aria-live="polite">
        <p class="log__empty" id="js-log-empty">Nenhuma atividade recente.</p>
        <ul class="log__list" id="js-log-list" aria-label="Entradas de log"></ul>
      </section>

    </main>

    <footer class="app__footer">
      <button class="footer__btn" id="js-btn-options"
              aria-label="Abrir página de configurações">
        Configurações
      </button>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
