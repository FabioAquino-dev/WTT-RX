<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>WTT-RX</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <header class="app__header">
      <svg class="app__logo" width="18" height="18" viewBox="0 0 24 24" fill="none"
           aria-hidden="true" focusable="false">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#1e9af5" stroke-width="2"
              stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1e9af5" stroke-width="2"
              stroke-linejoin="round"/>
      </svg>
      <h1 class="app__title">WTT-RX</h1>
      <span class="app__version">v0.2.0</span>
    </header>

    <main class="app__content">

      <div class="status-card" aria-label="Estado do painel">
        <span class="status-card__dot" id="js-status-dot" aria-hidden="true"></span>
        <span class="status-card__label" id="js-status-label">Verificando…</span>
      </div>

      <button class="btn btn--primary btn--full" id="js-btn-toggle"
              aria-label="Ativar ou desativar o painel flutuante">
        Ativar Painel
      </button>

      <p class="hint" id="js-hint">
        O painel aparecerá na página ativa do sistema de radiologia.
      </p>

    </main>

  </div>
  <script src="popup.js"></script>
</body>
</html>
