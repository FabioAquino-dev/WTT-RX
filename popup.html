<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>WTT-RX</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <header class="app__header">
      <svg class="app__logo" width="18" height="18" viewBox="0 0 24 24" fill="none"
           aria-hidden="true" focusable="false">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="#1e9af5" stroke-width="2"
              stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="#1e9af5" stroke-width="2"
              stroke-linejoin="round"/>
      </svg>
      <h1 class="app__title">WTT-RX</h1>
      <span class="app__version">v0.2.0</span>
    </header>

    <div class="toolbar">
      <div class="session-status">
        <span class="status-dot" id="js-session-dot" aria-hidden="true"></span>
        <span class="session-label" id="js-session-label">Aguardando busca…</span>
      </div>
      <button class="btn btn--primary" id="js-btn-fetch"
              aria-label="Buscar exames no servidor">
        Buscar
      </button>
    </div>

    <main class="app__content" id="js-content" aria-live="polite">
      <p class="empty-state">Clique em "Buscar" para carregar os exames do servidor.</p>
    </main>

    <footer class="app__footer">
      <button class="btn btn--ghost" id="js-btn-export" disabled
              aria-label="Exportar dados como JSON">
        Exportar JSON
      </button>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
